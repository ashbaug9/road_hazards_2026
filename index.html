<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Road Hazard Reporter</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">

<!-- ============================================================
  ROAD HAZARD REPORTER  —  Setup Instructions
  ============================================================
  Works immediately using local browser storage (single device).

  For real-time crowdsourcing (everyone sees the same pins):
  1. Go to https://console.firebase.google.com
  2. Add project → Build → Realtime Database → Create → Test mode
  3. Copy your database URL and paste it into FIREBASE_URL below

  To host publicly: upload as index.html to GitHub Pages (free).
  ============================================================ -->

<script>
  const FIREBASE_URL = 'https://road-closures-2026-default-rtdb.firebaseio.com/';   // e.g. 'https://your-project-default-rtdb.firebaseio.com'
  const MAP_CENTER   = [45.6499, -84.4932];
  const MAP_ZOOM     = 13;
  const PAGE_TITLE   = 'Road Hazard Reporter';
</script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #ffffff;
  --bg2:     #f5f4f0;
  --bg3:     #eceae4;
  --border:  rgba(0,0,0,0.12);
  --border2: rgba(0,0,0,0.22);
  --text:    #1a1a1a;
  --text2:   #555550;
  --text3:   #888882;
  --radius:  8px;
  --shadow:  0 2px 14px rgba(0,0,0,0.16);
}

html { height: -webkit-fill-available; }
body {
  font-family: 'Barlow', sans-serif;
  font-size: 14px;
  color: var(--text);
  background: var(--bg2);
  height: 100vh;
  height: 100dvh;
  min-height: -webkit-fill-available;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
button { touch-action: manipulation; }

/* ── Header ── */
#header {
  background: #1c2127;
  display: flex;
  align-items: center;
  padding: 0 14px;
  gap: 8px;
  z-index: 1000;
  flex-shrink: 0;
  height: 52px;
  padding-top: env(safe-area-inset-top, 0px);
}
#header h1 {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 18px; font-weight: 700;
  color: #fff; flex: 1;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
#count-badge {
  font-size: 11px; background: rgba(255,255,255,0.12);
  color: rgba(255,255,255,0.75); border-radius: 999px;
  padding: 3px 9px; border: 1px solid rgba(255,255,255,0.15);
  white-space: nowrap; flex-shrink: 0;
}
#filter-bar { display: flex; gap: 5px; align-items: center; flex-shrink: 0; }
.filter-dot {
  width: 18px; height: 18px; border-radius: 50%;
  border: 2.5px solid rgba(255,255,255,0.5);
  cursor: pointer; flex-shrink: 0;
  transition: opacity 0.15s, transform 0.15s;
}
.filter-dot:hover { transform: scale(1.15); }
.filter-dot.off { opacity: 0.25; }
#btn-report-hdr {
  font-family: 'Barlow', sans-serif;
  font-size: 13px; font-weight: 500;
  padding: 7px 13px; border-radius: var(--radius);
  border: none; background: #E24B4A; color: #fff;
  cursor: pointer; white-space: nowrap; flex-shrink: 0;
  min-height: 36px; transition: background 0.15s;
}
#btn-report-hdr:hover { background: #c73937; }

/* ── Body ── */
#body { flex: 1; position: relative; overflow: hidden; display: flex; min-height: 0; }
#map { flex: 1; z-index: 1; cursor: crosshair; }

/* ── Side panel (desktop) ── */
#panel {
  width: 300px; background: var(--bg);
  border-left: 1px solid var(--border);
  transform: translateX(300px);
  transition: transform 0.24s ease;
  overflow-y: auto; z-index: 500; flex-shrink: 0;
  -webkit-overflow-scrolling: touch;
}
#panel.open { transform: translateX(0); }
#drag-handle { display: none; }
#panel-inner { padding: 16px 18px 24px; }

/* ── FAB (mobile only) ── */
#fab {
  display: none; position: absolute;
  bottom: 24px; right: 16px; z-index: 900;
  width: 58px; height: 58px; border-radius: 50%;
  background: #E24B4A; color: #fff; border: none;
  font-size: 30px; font-weight: 300; line-height: 1;
  cursor: pointer; box-shadow: var(--shadow);
  align-items: center; justify-content: center;
  transition: transform 0.15s, background 0.15s;
}
#fab:active { transform: scale(0.92); background: #c73937; }

/* ── Legend ── */
#legend {
  position: absolute; bottom: 32px; left: 12px;
  z-index: 800; background: var(--bg);
  border: 1px solid var(--border); border-radius: var(--radius);
  padding: 10px 12px; font-size: 12px; color: var(--text2);
  line-height: 2; box-shadow: var(--shadow); pointer-events: none;
}
.legend-row { display: flex; align-items: center; gap: 8px; }
.legend-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }

/* ── Hint ── */
#hint {
  position: absolute; top: 12px; left: 50%;
  transform: translateX(-50%); z-index: 800;
  background: rgba(28,33,39,0.82); color: rgba(255,255,255,0.9);
  font-size: 12px; font-weight: 500;
  padding: 6px 14px; border-radius: 999px;
  pointer-events: none; transition: opacity 0.4s; white-space: nowrap;
}

/* ── Toast ── */
#toast {
  position: absolute; bottom: 20px; left: 50%;
  transform: translateX(-50%) translateY(10px);
  opacity: 0; transition: all 0.22s;
  background: #1c2127; color: #fff;
  border-radius: var(--radius); padding: 10px 20px;
  font-size: 13px; font-weight: 500;
  z-index: 3000; pointer-events: none;
  white-space: nowrap; box-shadow: var(--shadow);
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── Backdrop ── */
#backdrop {
  display: none; position: absolute; inset: 0;
  background: rgba(0,0,0,0.4); z-index: 400;
  opacity: 0; transition: opacity 0.22s;
}
#backdrop.show { opacity: 1; }

/* ── Panel inner styles ── */
.panel-header {
  display: flex; justify-content: space-between;
  align-items: center; margin-bottom: 14px;
}
.panel-title { font-size: 15px; font-weight: 500; color: var(--text); }
.close-btn {
  background: none; border: none; cursor: pointer;
  font-size: 22px; color: var(--text3); padding: 4px;
  line-height: 1; min-width: 40px; min-height: 40px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%;
}
.close-btn:hover { background: var(--bg2); }

.field-label { font-size: 12px; color: var(--text2); display: block; margin-bottom: 5px; }
.field-group { margin-bottom: 14px; }

.field-input {
  font-family: 'Barlow', sans-serif;
  font-size: 16px; /* prevents iOS zoom */
  color: var(--text); background: var(--bg);
  border: 1px solid var(--border2); border-radius: var(--radius);
  padding: 10px 12px; width: 100%; outline: none;
  transition: border-color 0.15s; -webkit-appearance: none;
}
.field-input:focus { border-color: #4a90d9; }
textarea.field-input { resize: vertical; min-height: 80px; }

.type-grid { display: flex; flex-direction: column; gap: 6px; }
.type-opt {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 12px; border-radius: var(--radius);
  border: 1px solid var(--border); background: var(--bg2);
  cursor: pointer; font-size: 14px; color: var(--text2);
  font-family: 'Barlow', sans-serif; text-align: left;
  min-height: 44px; transition: all 0.12s; -webkit-appearance: none;
}
.type-opt:active { background: var(--bg3); }
.type-opt.sel { background: var(--bg); color: var(--text); font-weight: 500; }
.type-dot { width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0; }

.loc-pill {
  font-size: 12px; color: var(--text2); background: var(--bg2);
  border: 1px solid var(--border); border-radius: var(--radius);
  padding: 8px 10px; margin-bottom: 14px;
}
.loc-needed {
  font-size: 13px; color: #7a5c00;
  background: #fff8e6; border: 1px solid #f0d070;
  border-radius: var(--radius); padding: 10px 12px;
  margin-bottom: 8px; line-height: 1.5;
}
.btn-gps {
  display: flex; align-items: center; gap: 8px;
  width: 100%; padding: 10px 12px; margin-bottom: 14px;
  border-radius: var(--radius); border: 1px solid var(--border2);
  background: var(--bg); font-family: 'Barlow', sans-serif;
  font-size: 14px; color: var(--text2); cursor: pointer;
  min-height: 44px; transition: all 0.12s;
}
.btn-gps:active { background: var(--bg2); }

.btn-submit {
  font-family: 'Barlow', sans-serif;
  width: 100%; padding: 13px; border-radius: var(--radius);
  border: none; background: #1c2127; color: #fff;
  font-size: 15px; font-weight: 500; cursor: pointer;
  min-height: 48px; transition: background 0.15s; -webkit-appearance: none;
}
.btn-submit:active { background: #111418; }
.btn-submit:disabled { opacity: 0.6; }

.btn-remove {
  font-family: 'Barlow', sans-serif;
  width: 100%; padding: 11px; border-radius: var(--radius);
  border: 1px solid var(--border2); background: none;
  color: var(--text3); font-size: 13px; cursor: pointer;
  margin-top: 10px; min-height: 44px; transition: all 0.12s;
  -webkit-appearance: none;
}
.btn-remove:active { color: #E24B4A; border-color: #E24B4A; }
.err { font-size: 12px; color: #E24B4A; margin-top: 8px; }

.detail-type-row { display: flex; align-items: center; gap: 7px; }
.detail-road { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
.detail-meta { font-size: 12px; color: var(--text3); margin-bottom: 12px; }
.detail-desc { font-size: 14px; line-height: 1.55; color: var(--text); margin-bottom: 14px; }
.detail-photo { width: 100%; border-radius: var(--radius); display: block; margin-bottom: 12px; border: 1px solid var(--border); }
.detail-coords { font-size: 11px; color: var(--text3); }

/* ════════════════════════════════
   MOBILE  (≤ 640px)
════════════════════════════════ */
@media (max-width: 640px) {
  #btn-report-hdr { display: none; }
  #count-badge    { display: none; }
  #legend         { display: none; }
  #backdrop       { display: block; }
  #fab            { display: flex; }
  #drag-handle    {
    display: block; width: 40px; height: 4px;
    background: var(--border2); border-radius: 2px;
    margin: 12px auto 4px; flex-shrink: 0;
  }
  #map { cursor: default; }

  #panel {
    position: absolute; left: 0; right: 0; bottom: 0;
    width: 100%; max-height: 82vh;
    border-left: none; border-top: 1px solid var(--border);
    border-radius: 16px 16px 0 0;
    transform: translateY(110%);
    display: flex; flex-direction: column;
    padding-bottom: env(safe-area-inset-bottom, 16px);
  }
  #panel.open { transform: translateY(0); }

  #panel-inner { padding: 6px 18px 20px; overflow-y: auto; flex: 1; }

  #hint { font-size: 11px; }
  #toast { bottom: 88px; }

  .leaflet-bottom.leaflet-right { bottom: 80px !important; }
}

@media (max-width: 380px) {
  .filter-dot { width: 15px; height: 15px; }
  #header h1  { font-size: 15px; }
}
</style>

</head>
<body>

<div id="header">
  <h1 id="page-title">Road Hazard Reporter</h1>
  <span id="count-badge">0 reports</span>
  <div id="filter-bar"></div>
  <button id="btn-report-hdr" onclick="openReportPanel(null)">+ Report hazard</button>
</div>

<div id="body">
  <div id="map"></div>

  <div id="backdrop" onclick="closePanel()"></div>

  <div id="panel">
    <div id="drag-handle"></div>
    <div id="panel-inner"></div>
  </div>

<button id="fab" onclick="openReportPanel(null)" aria-label="Report a hazard">+</button>

  <div id="legend"></div>
  <div id="hint"></div>
  <div id="toast"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const TYPES = {
  closed:   { label:'Road closed', color:'#E24B4A', short:'C' },
  washout:  { label:'Washout',     color:'#D4700A', short:'W' },
  flooding: { label:'Flooding',    color:'#2B7FD4', short:'F' },
  caution:  { label:'Caution',     color:'#C98B00', short:'!' },
  reopened: { label:'Reopened',    color:'#3A8A1A', short:'R' },
};

const KEY = 'road-hazards-v1';
const USE_FIREBASE = FIREBASE_URL && FIREBASE_URL.length > 0;
let hazards=[], mkrs={}, activeFilters=new Set(Object.keys(TYPES)), pendingLL=null;

const mobile = () => window.innerWidth <= 640;

// ── Map init ─────────────────────────────────────────────────
const map = L.map('map', {
  zoomControl: !mobile(),
  tap: true, tapTolerance: 15,
}).setView(MAP_CENTER, MAP_ZOOM);

if (mobile()) L.control.zoom({ position: 'bottomright' }).addTo(map);

L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/">CARTO</a>',
  maxZoom: 19,
}).addTo(map);

map.on('click', e => { pendingLL = e.latlng; openReportPanel(e.latlng); });

document.getElementById('page-title').textContent = PAGE_TITLE;
document.getElementById('hint').textContent =
  mobile() ? 'Tap the map to report a hazard' : 'Click anywhere on the map to report a hazard';
setTimeout(() => { document.getElementById('hint').style.opacity = '0'; }, 4000);

// ── Storage ───────────────────────────────────────────────────
async function loadHazards() {
  if (USE_FIREBASE) {
    try {
      const r = await fetch(`${FIREBASE_URL}/hazards.json`);
      const d = await r.json();
      if (d) hazards = Object.entries(d).map(([id,h]) => ({...h,id}));
    } catch(e) { loadLocal(); }
  } else { loadLocal(); }
  hazards.forEach(addMarker);
  updateCount();
}
function loadLocal() {
  try { const s=localStorage.getItem(KEY); if(s) hazards=JSON.parse(s); } catch(e){hazards=[];}
}
async function saveHazard(h) {
  if (USE_FIREBASE) {
    try {
      const r=await fetch(`${FIREBASE_URL}/hazards/${h.id}.json`,
        {method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(h)});
      if(!r.ok) throw 0;
    } catch(e) { saveLocal(); }
  } else { saveLocal(); }
}
async function removeHazard(id) {
  if (USE_FIREBASE) {
    try { await fetch(`${FIREBASE_URL}/hazards/${id}.json`,{method:'DELETE'}); } catch(e){}
  }
  hazards=hazards.filter(h=>h.id!==id); saveLocal();
}
function saveLocal() {
  try { localStorage.setItem(KEY,JSON.stringify(hazards)); } catch(e){}
}
function startFirebaseListener() {
  if (!USE_FIREBASE) return;
  const src=new EventSource(`${FIREBASE_URL}/hazards.json?accept=text/event-stream`);
  src.addEventListener('put', e => {
    const {path,data}=JSON.parse(e.data);
    if (path==='/'&&data) {
      Object.entries(data).forEach(([id,h])=>{
        if (!mkrs[id]) { h.id=id; hazards.push(h); addMarker(h); updateCount(); }
      });
    }
  });
}

// ── Markers ───────────────────────────────────────────────────
function makeIcon(type) {
  const t=TYPES[type]||TYPES.caution, sz=mobile()?36:30, fs=mobile()?13:12;
  return L.divIcon({
    className:'',
    html:`<div style="width:${sz}px;height:${sz}px;border-radius:50%;background:${t.color};border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;font-size:${fs}px;font-weight:700;color:#fff;cursor:pointer;font-family:sans-serif;">${t.short}</div>`,
    iconSize:[sz,sz],iconAnchor:[sz/2,sz/2],popupAnchor:[0,-sz/2-4],
  });
}
function addMarker(h) {
  const m=L.marker([h.lat,h.lng],{icon:makeIcon(h.type)});
  m.on('click',()=>openDetailPanel(h));
  if (activeFilters.has(h.type)) m.addTo(map);
  mkrs[h.id]=m;
}

// ── UI helpers ────────────────────────────────────────────────
function updateCount() {
  const n=hazards.length;
  document.getElementById('count-badge').textContent=n+' report'+(n!==1?'s':'');
}
function buildFilterBar() {
  document.getElementById('filter-bar').innerHTML=Object.entries(TYPES).map(([k,v])=>
    `<div class="filter-dot" title="${v.label}" style="background:${v.color}" onclick="toggleFilter('${k}',this)"></div>`
  ).join('');
}
function buildLegend() {
  document.getElementById('legend').innerHTML=Object.entries(TYPES).map(([k,v])=>
    `<div class="legend-row"><span class="legend-dot" style="background:${v.color};"></span>${v.label}</div>`
  ).join('');
}
function toggleFilter(type,dot) {
  dot.classList.toggle('off');
  if (activeFilters.has(type)) {
    activeFilters.delete(type);
    hazards.filter(h=>h.type===type).forEach(h=>mkrs[h.id]&&map.removeLayer(mkrs[h.id]));
  } else {
    activeFilters.add(type);
    hazards.filter(h=>h.type===type).forEach(h=>mkrs[h.id]&&mkrs[h.id].addTo(map));
  }
}
function showPanel() {
  document.getElementById('panel').classList.add('open');
  if (mobile()) {
    const bd=document.getElementById('backdrop');
    bd.style.display='block';
    requestAnimationFrame(()=>bd.classList.add('show'));
  }
}
function closePanel() {
  document.getElementById('panel').classList.remove('open');
  const bd=document.getElementById('backdrop');
  bd.classList.remove('show');
  setTimeout(()=>{ if(!bd.classList.contains('show')) bd.style.display=''; },260);
  pendingLL=null;
}
function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

// ── GPS helper ────────────────────────────────────────────────
function useMyLocation() {
  const btn=document.getElementById('gps-btn');
  if (btn) { btn.textContent='Getting location…'; btn.disabled=true; }
  navigator.geolocation.getCurrentPosition(pos => {
    pendingLL=L.latLng(pos.coords.latitude,pos.coords.longitude);
    map.panTo(pendingLL);
    const el=document.getElementById('loc-display');
    if (el) { el.className='loc-pill'; el.innerHTML=`&#x1F4CC; Pinned at ${pendingLL.lat.toFixed(4)}, ${pendingLL.lng.toFixed(4)}`; }
    const row=document.getElementById('gps-row'); if(row) row.style.display='none';
  }, () => {
    if (btn) { btn.textContent='&#x25CE; Use my location'; btn.disabled=false; }
    showToast('Could not get location — tap the map instead');
  }, {enableHighAccuracy:true,timeout:8000});
}

// ── Report panel ──────────────────────────────────────────────
function openReportPanel(ll) {
  pendingLL=ll;
  const coords=ll?`${ll.lat.toFixed(4)}, ${ll.lng.toFixed(4)}`:null;
  const locHtml=coords
    ?`<div id="loc-display" class="loc-pill">&#x1F4CC; Pinned at ${coords}</div>`
    :`<div>
        <div id="loc-display" class="loc-needed">${mobile()?'Tap the map to pin your spot, or use the button below.':'Click anywhere on the map to pin your location.'}</div>
        ${navigator.geolocation?`<div id="gps-row"><button id="gps-btn" class="btn-gps" onclick="useMyLocation()"><span style="font-size:16px;">&#x25CE;</span> Use my current location</button></div>`:''}
      </div>`;

  document.getElementById('panel-inner').innerHTML=`
    <div class="panel-header">
      <span class="panel-title">Report a hazard</span>
      <button class="close-btn" onclick="closePanel()">&#x2715;</button>
    </div>
    ${locHtml}
    <div class="field-group">
      <span class="field-label">Hazard type</span>
      <div class="type-grid">${Object.entries(TYPES).map(([k,v])=>
        `<button class="type-opt" onclick="selType('${k}',this)"><span class="type-dot" style="background:${v.color};"></span>${v.label}</button>`
      ).join('')}</div>
      <input type="hidden" id="f-type">
    </div>
    <div class="field-group"><span class="field-label">Road name</span>
      <input class="field-input" id="f-road" type="text" placeholder="e.g. M-68, County Rd 489" autocomplete="off"></div>
    <div class="field-group"><span class="field-label">Description</span>
      <textarea class="field-input" id="f-desc" rows="3" placeholder="Describe what you saw..."></textarea></div>

```
<div class="field-group"><span class="field-label">Photo (optional)</span>
  <input class="field-input" id="f-photo" type="file" accept="image/*" style="padding:8px;font-size:14px;"></div>
<div class="field-group"><span class="field-label">Your name (optional)</span>
  <input class="field-input" id="f-name" type="text" placeholder="Anonymous" autocomplete="name"></div>
<button class="btn-submit" onclick="submitReport()">Submit report</button>
<div id="f-err" class="err"></div>
```

`;
showPanel();
}

function selType(k,btn) {
document.getElementById(‘f-type’).value=k;
document.querySelectorAll(’.type-opt’).forEach(b=>{b.classList.remove(‘sel’);b.style.borderColor=’’;});
btn.classList.add(‘sel’); btn.style.borderColor=TYPES[k].color;
}

async function submitReport() {
const type=document.getElementById(‘f-type’).value;
const road=document.getElementById(‘f-road’).value.trim();
const desc=document.getElementById(‘f-desc’).value.trim();
const name=document.getElementById(‘f-name’).value.trim()||‘Anonymous’;
const errEl=document.getElementById(‘f-err’);
if (!type) { errEl.textContent=‘Please select a hazard type.’; return; }
const ll=pendingLL||map.getCenter();
const btn=document.querySelector(’.btn-submit’);
if (btn) { btn.textContent=‘Submitting…’; btn.disabled=true; }
async function finish(photo) {
const h={
id:Date.now().toString(36)+Math.random().toString(36).slice(2,5),
lat:ll.lat,lng:ll.lng,type,road:road||‘Pinned on map’,
desc,reporter:name,
date:new Date().toLocaleDateString(‘en-US’,{month:‘short’,day:‘numeric’,year:‘numeric’}),
photo:photo||null,
};
hazards.push(h); await saveHazard(h); addMarker(h); updateCount();
closePanel(); map.panTo([h.lat,h.lng]);
showToast(‘Hazard reported — thank you!’);
}
const file=document.getElementById(‘f-photo’).files[0];
if (file) { compressPhoto(file,finish); } else { await finish(null); }
}

function compressPhoto(file,cb) {
const r=new FileReader();
r.onload=e=>{
const img=new Image();
img.onload=()=>{
const max=800,c=document.createElement(‘canvas’);
let w=img.width,h=img.height;
if(w>max||h>max){if(w>h){h=Math.round(h*max/w);w=max;}else{w=Math.round(w*max/h);h=max;}}
c.width=w;c.height=h;c.getContext(‘2d’).drawImage(img,0,0,w,h);
cb(c.toDataURL(‘image/jpeg’,0.6));
};
img.src=e.target.result;
};
r.readAsDataURL(file);
}

// ── Detail panel ──────────────────────────────────────────────
function openDetailPanel(h) {
const t=TYPES[h.type]||TYPES.caution;
document.getElementById(‘panel-inner’).innerHTML=` <div class="panel-header"> <div class="detail-type-row"> <span class="type-dot" style="background:${t.color};width:14px;height:14px;"></span> <span class="panel-title">${t.label}</span> </div> <button class="close-btn" onclick="closePanel()">&#x2715;</button> </div> <div class="detail-road">${h.road}</div> <div class="detail-meta">Reported ${h.date} &middot; ${h.reporter}</div> ${h.desc?`<div class="detail-desc">${h.desc}</div>`:''} ${h.photo?`<img class="detail-photo" src="${h.photo}" alt="Hazard photo">`:''} <div class="detail-coords">${h.lat.toFixed(5)}, ${h.lng.toFixed(5)}</div> <button class="btn-remove" onclick="confirmRemove('${h.id}')">Remove this report</button> `;
showPanel(); map.panTo([h.lat,h.lng]);
}

async function confirmRemove(id) {
if (!confirm(‘Remove this report from the map?’)) return;
if (mkrs[id]) { map.removeLayer(mkrs[id]); delete mkrs[id]; }
await removeHazard(id); closePanel(); updateCount();
showToast(‘Report removed’);
}

// ── Init ──────────────────────────────────────────────────────
buildFilterBar(); buildLegend(); loadHazards(); startFirebaseListener();
</script>
